apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
    spec:
      containers:
        - name: cluster-dashboard
          image: ghcr.io/m-ryan-nugent/cluster-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /frontend/
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /frontend/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: config-files
              mountPath: /usr/share/nginx/html/config/nodes.json
              subPath: nodes.json
      volumes:
        - name: config-files
          configMap:
            name: cluster-dashboard-config