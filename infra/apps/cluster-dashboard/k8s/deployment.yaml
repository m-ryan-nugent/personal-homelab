apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-dashboard
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-dashboard
  template:
    metadata:
      labels:
        app: cluster-dashboard
    spec:
      containers:
        - name: cluster-dashboard
          image: cluster-dashboard:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config-files
              mountPath: /usr/share/nginx/html/config/nodes.json
              subPath: nodes.json
      volumes:
        - name: config-files
          configMap:
            name: cluster-dashboard-config