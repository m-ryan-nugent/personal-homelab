apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-dashboard-frontend
  namespace: homelab
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cluster Dashboard</title>
        <link rel="stylesheet" href="./styles.css" />
      </head>
      <body>
        <main class="dashboard">
          <header class="hero">
            <div>
              <p class="eyebrow">Homelab Dashboard</p>
              <h1 id="cluster-name">Loading cluster...</h1>
              <p class="subtitle">
                A monitor-friendly overview of cluster nodes and services.
              </p>
            </div>

            <div class="hero-meta">
              <div class="meta-card">
                <span class="meta-label">Environment</span>
                <span id="environment" class="meta-value">-</span>
              </div>

              <div class="meta-card">
                <span class="meta-label">Last Updated</span>
                <span id="last-updated" class="meta-value">-</span>
              </div>
            </div>
          </header>

          <section class="panel">
            <div class="section-header">
              <h2>Nodes</h2>
              <p>Cluster inventory and current node roles.</p>
            </div>

            <div id="nodes-grid" class="nodes-grid">
              <p class="loading-text">Loading nodes...</p>
            </div>
          </section>

          <section class="panel">
            <div class="section-header">
              <h2>Services</h2>
              <p>Quick links to cluster tools and applications.</p>
            </div>

            <div id="services-grid" class="services-grid">
              <p class="loading-text">Loading services...</p>
            </div>
          </section>
        </main>

        <template id="node-card-template">
          <article class="card node-card">
            <div class="card-header">
              <h3 class="card-title"></h3>
              <span class="status-badge"></span>
            </div>

            <dl class="details-list">
              <div class="detail-row">
                <dt>Role</dt>
                <dd class="node-role"></dd>
              </div>

              <div class="detail-row">
                <dt>Model</dt>
                <dd class="node-model"></dd>
              </div>

              <div class="detail-row">
                <dt>IP</dt>
                <dd class="node-ip"></dd>
              </div>

              <div class="detail-row">
                <dt>Purpose</dt>
                <dd class="node-purpose"></dd>
              </div>
            </dl>
          </article>
        </template>

        <template id="service-card-template">
          <a class="card service-card" target="_blank" rel="noreferrer">
            <div class="card-header">
              <h3 class="card-title"></h3>
            </div>
            <p class="service-description"></p>
          </a>
        </template>

        <script src="./app.js"></script>
      </body>
    </html>

  styles.css: |
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-alt: #182142;
      --border: #2b376b;
      --text: #ebf0ff;
      --muted: #a9b4d0;
      --accent: #7aa2ff;
      --accent-soft: rgba(122, 162, 255, 0.14);
      --good: #35c98b;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(122, 162, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(53, 201, 139, 0.08), transparent 22%),
        var(--bg);
      color: var(--text);
    }

    body {
      padding: 32px;
    }

    .dashboard {
      max-width: 1440px;
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 24px;
      align-items: stretch;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.78rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .hero-meta {
      display: grid;
      gap: 16px;
    }

    .meta-card,
    .panel,
    .card {
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .meta-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 110px;
      padding: 20px;
      background: linear-gradient(180deg, rgba(24, 33, 66, 0.96), rgba(18, 25, 51, 0.96));
    }

    .meta-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .meta-value {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .panel {
      padding: 22px;
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px 16px;
      align-items: baseline;
      margin-bottom: 18px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 1.45rem;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
    }

    .nodes-grid,
    .services-grid {
      display: grid;
      gap: 18px;
    }

    .nodes-grid {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .services-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      padding: 18px;
      text-decoration: none;
      color: inherit;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .card-title {
      margin: 0;
      font-size: 1.08rem;
    }

    .status-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(53, 201, 139, 0.14);
      color: var(--good);
      border: 1px solid rgba(53, 201, 139, 0.35);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .details-list {
      margin: 0;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid rgba(169, 180, 208, 0.12);
    }

    .detail-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .detail-row dt {
      color: var(--muted);
      font-weight: 600;
    }

    .detail-row dd {
      margin: 0;
    }

    .service-card {
      display: block;
      background: linear-gradient(180deg, rgba(24, 33, 66, 0.96), rgba(18, 25, 51, 0.96));
    }

    .service-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .loading-text,
    .error-text,
    .empty-text {
      margin: 0;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      body {
        padding: 20px;
      }

      .hero {
        grid-template-columns: 1fr;
      }
    }

  app.js: |
    const CONFIG_PATH = "../config/nodes.json";

    async function loadDashboardData() {
      const response = await fetch(CONFIG_PATH);

      if (!response.ok) {
        throw new Error(`Failed to load dashboard config: ${response.status}`);
      }

      return response.json();
    }

    function setOverview(data) {
      document.getElementById("cluster-name").textContent =
        data.clusterName || "Cluster Dashboard";
      document.getElementById("environment").textContent =
        data.environment || "Unknown";
      document.getElementById("last-updated").textContent =
        data.lastUpdated || "Unknown";
    }

    function createNodeCard(node) {
      const template = document.getElementById("node-card-template");
      const fragment = template.content.cloneNode(true);

      fragment.querySelector(".card-title").textContent = node.name;
      fragment.querySelector(".status-badge").textContent = node.status;
      fragment.querySelector(".node-role").textContent = node.role;
      fragment.querySelector(".node-model").textContent = node.model;
      fragment.querySelector(".node-ip").textContent = node.ip;
      fragment.querySelector(".node-purpose").textContent = node.purpose;

      return fragment;
    }

    function renderNodes(nodes) {
      const container = document.getElementById("nodes-grid");
      container.innerHTML = "";

      if (!Array.isArray(nodes) || nodes.length === 0) {
        container.innerHTML = '<p class="empty-text">No nodes configured.</p>';
        return;
      }

      nodes.forEach((node) => {
        container.appendChild(createNodeCard(node));
      });
    }

    function createServiceCard(service) {
      const template = document.getElementById("service-card-template");
      const fragment = template.content.cloneNode(true);
      const card = fragment.querySelector(".service-card");

      card.href = service.url || "#";
      fragment.querySelector(".card-title").textContent = service.name;
      fragment.querySelector(".service-description").textContent =
        service.description || "";

      return fragment;
    }

    function renderServices(services) {
      const container = document.getElementById("services-grid");
      container.innerHTML = "";

      if (!Array.isArray(services) || services.length === 0) {
        container.innerHTML = '<p class="empty-text">No services configured.</p>';
        return;
      }

      services.forEach((service) => {
        container.appendChild(createServiceCard(service));
      });
    }

    function renderError(message) {
      document.getElementById("nodes-grid").innerHTML = `
        <p class="error-text">${message}</p>
      `;
      document.getElementById("services-grid").innerHTML = `
        <p class="error-text">Unable to load services.</p>
      `;
    }

    async function initDashboard() {
      try {
        const data = await loadDashboardData();
        setOverview(data);
        renderNodes(data.nodes);
        renderServices(data.services);
      } catch (error) {
        console.error(error);
        renderError("Unable to load dashboard configuration.");
      }
    }

    initDashboard();