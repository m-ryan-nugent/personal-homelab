server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /frontend/;
    }

    location /frontend/ {
        try_files $uri $uri/ /frontend/index.html;
    }

    location /config/ {
        try_files $uri =404;
    }
}